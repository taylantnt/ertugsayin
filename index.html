<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stylized Nav Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Syne+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      background: #fdfcf7;
      transition: font 0.5s ease, background 0.5s ease;
    }

    body {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding-left: 5rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      text-align: left;
    }

    .nav-item {
      font-size: 4rem;
      color: #111;
      cursor: pointer;
      transition: all 0.5s ease;
      font-family: 'Orbitron', sans-serif;
    }

    .nav-item:hover {
      font-family: 'Syne Mono', monospace;
      transform: translateX(10px);
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-size: 3rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .page.active {
      opacity: 1;
      pointer-events: all;
    }

    .back-button {
      position: absolute;
      top: 2rem;
      left: 2rem;
      font-size: 1.5rem;
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .back-button:hover {
      background: white;
      color: #111;
    }
  </style>
</head>
<body>
  <nav id="nav">
    <div class="nav-item" onclick="navigate('about')">about</div>
    <div class="nav-item" onclick="navigate('gallery')">gallery</div>
    <div class="nav-item" onclick="navigate('pricing')">pricing</div>
    <div class="nav-item" onclick="navigate('contact')">contact</div>
  </nav>

  <div id="about" class="page">
    <button class="back-button" onclick="goBack()">Back</button>
    About Page
  </div>
  <div id="gallery" class="page">
    <button class="back-button" onclick="goBack()">Back</button>
    Gallery Page
  </div>
  <div id="pricing" class="page">
    <button class="back-button" onclick="goBack()">Back</button>
    Pricing Page
  </div>
  <div id="contact" class="page">
    <button class="back-button" onclick="goBack()">Back</button>
    Contact Page
  </div>

  <script>
    const nav = document.getElementById('nav');

    function navigate(pageId) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      nav.style.display = 'none';
    }

    function goBack() {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      nav.style.display = 'flex';
    }
  </script>
</body>
</html>
